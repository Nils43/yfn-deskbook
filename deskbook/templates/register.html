<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YFN — Register</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0a;
      --card: #1a1a1a;
      --border: #2a2a2a;
      --text: #fff;
      --muted: #4EF3F5;
      --green: #FFED00;
      --red: #ef4444;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; -webkit-font-smoothing: antialiased; }
    nav { padding: 1rem 2rem; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 0.6rem; font-weight: 700; font-size: 1rem; }
    .logo-mark { width: 26px; height: 26px; background: var(--green); border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 0.6rem; font-weight: 800; color: var(--bg); }
    .container { max-width: 420px; margin: 0 auto; padding: 4rem 1.5rem; }
    h1 { font-size: 1.6rem; font-weight: 700; letter-spacing: -0.03em; margin-bottom: 0.3rem; }
    .sub { color: var(--muted); font-size: 0.88rem; margin-bottom: 2rem; }
    .field { margin-bottom: 1rem; }
    .field label { display: block; font-size: 0.68rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); margin-bottom: 0.3rem; }
    .field input { width: 100%; font-family: 'Inter', sans-serif; font-size: 0.85rem; color: var(--text); background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 0.65rem 0.8rem; outline: none; }
    .field input:focus { border-color: var(--green); }
    .btn { width: 100%; font-family: 'Inter', sans-serif; font-weight: 600; font-size: 0.88rem; color: var(--bg); background: var(--green); border: none; border-radius: 50px; padding: 0.8rem; cursor: pointer; margin-top: 0.5rem; }
    .btn:hover { background: #e6d500; }
    .alert { padding: 0.7rem 0.9rem; border-radius: 8px; font-size: 0.82rem; margin-bottom: 1rem; }
    .alert.error { background: rgba(239, 68, 68, 0.1); color: var(--red); border: 1px solid rgba(239, 68, 68, 0.3); }
    .alert.success { background: rgba(255, 237, 0, 0.06); color: var(--green); border: 1px solid rgba(255, 237, 0, 0.4); }
  </style>
</head>
<body>
 
<nav>
  <div class="logo-mark">YFN</div>
  DeskBook
</nav>
 
<div class="container">
  <h1>Create account</h1>
  <p class="sub">Sign up to book a desk.</p>
 
  {% if error %}
    <div class="alert error">{{ error }}</div>
  {% endif %}
  {% if success %}
    <div class="alert success">{{ success }}</div>
  {% endif %}
 
  <form method="POST" action="/register" autocomplete="off">
    <div class="field">
      <label>Name</label>
      <input type="text" name="name" placeholder="Max Muster" required>
    </div>
    <div class="field">
      <label>Email</label>
      <input type="email" name="email" placeholder="max@yfn.de" required>
    </div>
    <div class="field">
      <label>Password (min. 8 chars)</label>
      <input type="password" name="password" minlength="8" required>
    </div>
    <button class="btn" type="submit">Create account</button>
  </form>
</div>
 
</body>
</html>
